name: Daily Gaming News Reel

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-reel:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Installa dipendenze Python
        run: |
          pip install requests
          pip install apify-client
      
      - name: Raccogli notizie gaming con Apify (ultimi 7 giorni)
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          python fetch_news_apify.py
      
      - name: Verifica file generati
        run: |
          echo "📁 File presenti dopo la raccolta:"
          ls -la
          echo ""
          if [ -f news_data.json ]; then
            echo "✅ news_data.json trovato!"
            echo "📰 Prime 3 notizie:"
            cat news_data.json | python -c "import sys, json; data=json.load(sys.stdin); [print(f'- {n.get(\"title\",\"\")[:80]}') for n in data[:3]]"
          else
            echo "❌ news_data.json NON TROVATO!"
            exit 1
          fi
      
      - name: Genera script per Pippit AI
        run: |
          python -c "
          import json
          
          with open('news_data.json', 'r', encoding='utf-8') as f:
              news = json.load(f)
          
          script = '🎮 NOTIZIE GAMING DEL GIORNO 🎮\n\n'
          for i, item in enumerate(news[:3], 1):
              title = item.get('title', 'Notizia senza titolo')
              desc = item.get('description', item.get('snippet', ''))[:120]
              source = item.get('source', {}).get('name', item.get('sourceName', ''))
              
              script += f'{i}. {title}\n'
              if desc:
                  script += f'{desc}\n'
              if source:
                  script += f'Fonte: {source}\n'
              script += '\n'
          
          script += '📱 Seguimi per altre notizie dal mondo del gaming!'
          
          with open('pippit_script.txt', 'w', encoding='utf-8') as f:
              f.write(script)
          
          print('✅ Script per Pippit AI generato in pippit_script.txt')
          print('\n' + '='*50)
          print('ANTEPRIMA SCRIPT:')
          print('='*50)
          print(script)
          "
      
      - name: Salva output come artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-gaming-news
          path: |
            news_data.json
            pippit_script.txt
          retention-days: 7
