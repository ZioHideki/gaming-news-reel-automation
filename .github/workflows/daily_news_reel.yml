name: Daily Gaming News Reel

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  generate-reel:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Installa dipendenze Python
        run: |
          pip install requests
      
      - name: Verifica file presenti (debug)
        run: |
          echo "📁 Contenuto repository:"
          ls -la
          echo ""
          echo "📄 Contenuto fetch_news.py:"
          cat fetch_news.py || echo "File non trovato!"
      
      - name: Test esecuzione Python (debug)
        run: |
          python -c "import requests; print('✅ requests importata con successo')"
          python -c "import json; print('✅ json importato')"
      
      - name: Raccogli notizie da Apify
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
        run: |
          python fetch_news.py
      
      - name: Mostra anteprima notizie (debug)
        run: |
          if [ -f news_data.json ]; then
            echo "📰 Notizie raccolte:"
            cat news_data.json | python -c "import sys, json; data=json.load(sys.stdin); print(f'Trovate {len(data)} notizie'); [print(f'- {n.get(\"title\",\"\")[:80]}') for n in data[:3]]"
          else
            echo "⚠️ Nessun file news_data.json trovato"
          fi
      
      - name: Salva output come artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-gaming-news
          path: |
            news_data.json
            fetch_news.py
          retention-days: 7
